<!DOCTYPE html>
<html>
<head>
    <title>Phishing Detector</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h1>AI Phishing Email Detector</h1>

    <form method="POST">
        <textarea name="email" placeholder="Paste your email here..." required></textarea>
        <button type="submit">Check Email</button>
    </form>

    {% if result %}
        <div class="result">
            <h2>Result: {{ result }}</h2>
            <p>Confidence: {{ (confidence*100)|round(2) }}%</p>
        </div>
    {% endif %}
</div>

</body>
</html>
